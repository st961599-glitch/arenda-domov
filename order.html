<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление договора</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем Firebase через зеркало cdnjs, оно точно сработает! -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <main class="container form-container">
        <a href="index.html" class="back-link">← Назад к тарифам</a>
        
        <h2>Оформление заявки</h2>
        <div id="tariff-summary" class="summary-box"></div>

        <form id="order-form">
            <div class="form-group">
                <label for="client-name">Ваше имя</label>
                <input type="text" id="client-name" required placeholder="Иван Иванов">
            </div>
            
            <div class="form-group">
                <label for="client-phone">Номер телефона</label>
                <input type="tel" id="client-phone" required placeholder="+7 (999) 000-00-00">
            </div>

            <button type="submit" class="submit-btn">Подтвердить заказ</button>
        </form>
    </main>

    <script>
        // Настройки вашего проекта Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDm3XvtldDnpLDH29uV8e0Z2Zwj9BVNqA",
            authDomain: "arenda ://firebaseapp.com",
            projectId: "arenda domov-e2e15",
            storageBucket: "arenda domov-e2e15.firebasestorage.app",
            messagingSenderId: "297684238985",
            appId: "1:297684238985:web:277fd972cdc8465ab5fc58",
            measurementId: "G-6G2984FBD1"
        };

        // Инициализация базы данных
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const tariffId = localStorage.getItem('selectedTariffId');
        const tariffPrice = localStorage.getItem('selectedTariffPrice');

        if (!tariffId) {
            window.location.href = 'index.html';
        }
// Регистрация
function register() {
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    const name = document.getElementById('registerName').value;
    auth.createUserWithEmailAndPassword(email, password)
        .then(credential => {
            return credential.user.updateProfile({ displayName: name });
        })
        .then(() => {
            alert('Регистрация прошла успешно!');
            showPage('catalogPage');
            loadProducts();
        })
        .catch(error => alert('Ошибка: ' + error.message));
}

// Вход
function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            alert('Добро пожаловать!');
            showPage('catalogPage');
            loadProducts();
        })
        .catch(error => alert('Ошибка: ' + error.message));
}

// Выйти
function logout() {
    auth.signOut();
}
        // Выводим выбранный тариф на экран
        document.getElementById('tariff-summary').innerHTML = `
            <p><strong>Выбранный период:</strong> ${tariffId}</p>
            <p><strong>Стоимость:</strong> ${Number(tariffPrice).toLocaleString('ru-RU')} ₽</p>
        `;

        // Отправка формы в базу данных клиентов
        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('client-name').value;
            const phone = document.getElementById('client-phone').value;

            try {
                // Добавляем документ в коллекцию "Данные клиента"
                await db.collection("Данные клиента").add({
                    имя: name,
                    телефон: phone,
                    тариф: tariffId,
                    цена: Number(tariffPrice),
                    датаЗаявки: new Date().toISOString()
                });

                alert('Спасибо! Заявка успешно отправлена.');
                localStorage.clear();
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error("Ошибка отправки:", error);
                alert('Ошибка отправки. Проверьте правила доступа Rules в Firebase.');
            }
        });
        function showLogin() {
    showPage('loginPage');
}
function showRegister() {
    showPage('registerPage');
}
    </script>
</body>
</html>
