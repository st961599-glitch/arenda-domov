<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Домов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ДомикВНаем</h1>
        <div id="auth-status">
            <span id="user-info"></span>
            <button id="logout-btn" class="hidden">Выйти</button>
        </div>
    </header>

    <main class="container">
        <!-- Блок авторизации -->
        <section id="auth-section" class="card">
            <h2>Вход / Регистрация</h2>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Пароль" required>
                <div class="auth-buttons">
                    <button type="button" id="login-btn">Войти</button>
                    <button type="button" id="register-btn">Регистрация</button>
                </div>
            </form>
        </section>

        <!-- Основной контент (доступен после входа) -->
        <div id="main-content" class="hidden">
            <!-- Форма добавления объявления -->
            <section id="add-listing-section" class="card">
                <h2>Добавить объявление аренды</h2>
                <form id="listing-form">
                    <input type="text" id="house-title" placeholder="Название дома (например, Вилла у озера)" required>
                    <input type="number" id="house-price" placeholder="Цена за сутки (руб.)" required>
                    <button type="submit">Опубликовать</button>
                </form>
            </section>

            <!-- Списки объявлений и корзина -->
            <div class="shop-floor">
                <section class="listings-container">
                    <h2>Доступные дома</h2>
                    <div id="listings-grid" class="grid"></div>
                </section>

                <section id="cart-section" class="card">
                    <h2>Ваша корзина</h2>
                    <ul id="cart-list"></ul>
                    <div class="cart-total">Итого: <span id="cart-sum">0</span> руб.</div>
                </section>
            </div>
        </div>
    </main>

    <!-- Подключение Firebase SDK (Модульный подход v10+) -->
    <script type="module" src="app.js"></script>
</body>
</html>
