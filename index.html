<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Домов - Тарифы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Arenda domov</h1>
        <p>Выберите подходящий тариф для аренды дома</p>
    </header>

    <main class="container">
        <div id="tariffs-grid" class="grid">
            <p class="loading">Загрузка тарифов...</p>
        </div>
    </main>

    <script type="module">
       import { initializeApp } from "./firebase-app.js";
import { getFirestore, collection, getDocs } from "./firebase-firestore.js";


        // Ваши точные настройки из скриншота
        const firebaseConfig = {
            apiKey: "AIzaSyDm3XvtldDnpLDH29uV8e0Z2Zwj9BVNqA",
            authDomain: "arenda ://firebaseapp.com",
            projectId: "arenda domov-e2e15",
            storageBucket: "arenda domov-e2e15.firebasestorage.app",
            messagingSenderId: "297684238985",
            appId: "1:297684238985:web:277fd972cdc8465ab5fc58",
            measurementId: "G-6G2984FBD1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadTariffs() {
            const grid = document.getElementById('tariffs-grid');
            try {
                const querySnapshot = await getDocs(collection(db, "Договор"));
                grid.innerHTML = ""; 

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Умный поиск полей (неважно, большая буква или маленькая)
                    const price = data.Цена || data.цена;
                    const duration = data.Продление || data.продление || data.Пrodlenie;

                    if (price && duration) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <h2>${duration}</h2>
                            <p class="price">${Number(price).toLocaleString('ru-RU')} ₽</p>
                            <button onclick="chooseTariff('${doc.id}', '${price}')">Выбрать</button>
                        `;
                        grid.appendChild(card);
                    }
                });

                if (grid.children.length === 0) {
                    grid.innerHTML = "<p>Тарифы найдены, но у них не совпадают имена полей 'Цена' или 'Продление'.</p>";
                }
            } catch (error) {
                console.error("Ошибка Firebase:", error);
                grid.innerHTML = "<p>Ошибка доступа. Пожалуйста, проверьте вкладку Rules в Firestore.</p>";
            }
        }

        window.chooseTariff = function(id, price) {
            localStorage.setItem('selectedTariffId', id);
            localStorage.setItem('selectedTariffPrice', price);
            window.location.href = 'order.html';
        }

        loadTariffs();
    </script>
</body>
</html>
