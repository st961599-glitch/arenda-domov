<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Домов - Тарифы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Arenda domov</h1>
        <p>Выберите подходящий тариф для аренды дома</p>
    </header>

    <main class="container">
        <div id="tariffs-grid" class="grid">
            <p class="loading">Загрузка тарифов...</p>
        </div>
    </main>

    <script>
        // Используем прямой доступ к вашей базе данных через интернет-адрес
        const projectId = "arenda-domov-e2e15";
        const url = `https://googleapis.com{projectId}/databases/(default)/documents/Договор`;

        async function loadTariffs() {
            const grid = document.getElementById('tariffs-grid');
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Ошибка сети или доступа Firestore Rules');
                
                const result = await response.json();
                grid.innerHTML = ""; // Очищаем текст загрузки

                if (!result.documents || result.documents.length === 0) {
                    grid.innerHTML = "<p>В коллекции 'Договор' нет документов.</p>";
                    return;
                }

                result.documents.forEach((doc) => {
                    const fields = doc.fields;
                    if (!fields) return;

                    // Достаем ID документа из его полного пути (например, "1месяц")
                    const docId = doc.name.split('/').pop();

                    // Достаем значения полей из структуры Firestore REST API
                    const priceField = fields.Цена || fields.цена;
                    const durationField = fields.Продление || fields.продление || fields.Пrodlenie;

                    if (priceField && durationField) {
                        const price = priceField.integerValue || priceField.stringValue || priceField.doubleValue;
                        const duration = durationField.stringValue;

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <h2>${duration}</h2>
                            <p class="price">${Number(price).toLocaleString('ru-RU')} ₽</p>
                            <button onclick="chooseTariff('${docId}', '${price}')">Выбрать</button>
                        `;
                        grid.appendChild(card);
                    }
                });

            } catch (error) {
                console.error("Ошибка:", error);
                grid.innerHTML = "<p>Не удалось загрузить данные. Проверьте вкладку Rules в Firestore.</p>";
            }
        }

        window.chooseTariff = function(id, price) {
            localStorage.setItem('selectedTariffId', id);
            localStorage.setItem('selectedTariffPrice', price);
            window.location.href = 'order.html';
        }

        loadTariffs();
    </script>
</body>
</html>
