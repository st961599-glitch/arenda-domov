<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Аренда дома — объявления и корзина</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🏠 Дом в аренду</div>

    <div class="auth">
      <div id="auth-guest" class="auth-block">
        <button id="showLogin">Войти</button>
        <button id="showRegister">Регистрация</button>
      </div>

      <div id="auth-user" class="auth-block" style="display:none;">
        <span id="userEmail" class="email"></span>
        <button id="logoutBtn">Выйти</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Auth forms -->
    <section id="authSection" class="card" style="display:none;">
      <h2 id="authTitle">Войти</h2>

      <form id="authForm" class="form">
        <label>
          Email
          <input id="email" type="email" autocomplete="username" required />
        </label>

        <label>
          Пароль
          <input id="password" type="password" autocomplete="current-password" required />
        </label>

        <button id="authSubmit" type="submit">Продолжить</button>
        <p id="authMsg" class="msg"></p>
      </form>
    </section>

    <!-- Create announcement -->
    <section class="grid">
      <section class="card">
        <h2>Добавить объявление</h2>

        <form id="listingForm" class="form">
          <label>
            Название объявления
            <input id="title" type="text" maxlength="80" required placeholder="Например: Дом у моря" />
          </label>

          <label>
            Цена (за месяц)
            <input id="price" type="number" min="0" step="1" required placeholder="Например: 80000" />
          </label>

          <label>
            Описание
            <textarea id="description" rows="4" maxlength="500" placeholder="Короткое описание"></textarea>
          </label>

          <button type="submit">Опубликовать</button>
          <p id="listingMsg" class="msg"></p>
        </form>
      </section>

      <section class="card">
        <h2>Объявления</h2>
        <div class="toolbar">
          <button id="refreshBtn" class="secondary">Обновить</button>
          <div id="countText" class="muted"></div>
        </div>

        <div id="listings" class="listings"></div>
      </section>
    </section>

    <!-- Cart -->
    <section class="card">
      <div class="cart-header">
        <h2>🛒 Корзина</h2>
        <div class="cart-actions">
          <button id="clearCartBtn" class="secondary">Очистить</button>
          <button id="checkoutBtn">Оформить</button>
        </div>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="cart-summary">
        <div class="muted">Итого</div>
        <div class="total" id="cartTotal">0 ₽</div>
      </div>

      <p id="cartMsg" class="msg"></p>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
