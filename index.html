<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Домов</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Железобетонное подключение Firebase (классический CDN, который не ломается) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <!-- Шапка сайта -->
    <header>
        <div class="logo">🏡 АрендаДомов</div>
        <div class="auth-status">
            <span id="user-info">Гость</span>
            <button id="logout-btn" class="hidden">Выйти из аккаунта</button>
        </div>
    </header>

    <div class="container">
        
        <!-- БЛОК АВТОРИЗАЦИИ (РЕАЛЬНО РАБОТАЕТ) -->
        <section id="auth-section" class="card">
            <h2>Вход или Регистрация</h2>
            <p class="hint">Введите email и пароль, затем нажмите нужную кнопку</p>
            <div class="form-group">
                <input type="email" id="auth-email" placeholder="Ваш Email (например: test@mail.ru)">
                <input type="password" id="auth-password" placeholder="Пароль (минимум 6 символов)">
            </div>
            <div class="auth-buttons">
                <button id="login-btn" class="btn btn-primary">Войти</button>
                <button id="register-btn" class="btn btn-secondary">Зарегистрироваться</button>
            </div>
        </section>

        <!-- ГЛАВНЫЙ ИНТЕРФЕЙС (ОТКРЫВАЕТСЯ ТОЛЬКО ПОСЛЕ ВХОДА) -->
        <div id="main-content" class="hidden">
            
            <!-- ФОРМА ДОБАВЛЕНИЯ ОБЪЯВЛЕНИЯ -->
            <section class="card">
                <h2>➕ Создать объявление аренды</h2>
                <div class="listing-form">
                    <input type="text" id="house-title" placeholder="Название дома (например: Вилла у моря)">
                    <input type="number" id="house-price" placeholder="Цена за сутки в рублях (например: 5000)">
                    <button id="add-listing-btn" class="btn btn-success">Опубликовать на сайт</button>
                </div>
            </section>

            <!-- КАТАЛОГ И КОРЗИНА -->
            <div class="site-grid">
                
                <!-- Живой список объявлений -->
                <section class="catalog">
                    <h2>📋 Доступные дома</h2>
                    <div id="listings-container" class="listings-grid">
                        <!-- Сюда добавляются объявления из базы данных -->
                    </div>
                </section>

                <!-- Настоящая корзина -->
                <section class="card cart-section">
                    <h2>🛒 Ваша корзина</h2>
                    <ul id="cart-list">
                        <!-- Сюда добавляются товары -->
                    </ul>
                    <div class="cart-total">
                        <strong>Итого:</strong> <span id="cart-total-sum">0</span> руб.
                    </div>
                </section>

            </div>

        </div>
    </div>

    <!-- Подключаем логику -->
    <script src="app.js"></script>
</body>
</html>
