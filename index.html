<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Домов - Тарифы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Arenda domov</h1>
        <p>Выберите подходящий тариф для аренды дома</p>

    </header>

    <main class="container">
        <div class="grid">
            
            <!-- Карточка 1 -->
             <img src="https://avatars.mds.yandex.net/i?id=147be2c4ccaba402de5b880b399c3adce5fc6b2a-4396222-images-thumbs&n=13" alt>
            <div class="card">
                <h2>На 1 месяц</h2>
                <p class="price">67 000 ₽</p>
                <button onclick="chooseTariff('1месяц', '60000')">Выбрать</button>
            </div>

            <!-- Карточка 2 -->
          <img src="https://avatars.mds.yandex.net/i?id=e8ab80f1159129416e6564800e16dd247d6efa12-16330514-images-thumbs&n=13" alt>  
            <div class="card">
                <h2>На 3 месяца</h2>
                <p class="price">150 000 ₽</p>
                <button onclick="chooseTariff('3месяца', '150000')">Выбрать</button>
            </div>

            <!-- Карточка 3 -->
            <img src="https://avatars.mds.yandex.net/i?id=2488e99372109c668df6709e27abcb464c8d6b2b-4571642-images-thumbs&n=13" alt>
            <div class="card">
                <h2>На 6 месяцев</h2>
                <p class="price">280 000 ₽</p>
                <button onclick="chooseTariff('6месяцев', '280000')">Выбрать</button>
            </div>

            <!-- Карточка 4 -->
             <img src="https://avatars.mds.yandex.net/i?id=de5cae37fd9936830ff7e0bf2b7c0046a1bde8a3-5664508-images-thumbs&n=13" alt>
            <div class="card">
                <h2>На 1 год</h2>
                <p class="price">540 000 ₽</p>
                <button onclick="chooseTariff('1год', '540000')">Выбрать</button>
            </div>

        </div>
    </main>

    <script>
        window.chooseTariff = function(id, price) {
            localStorage.setItem('selectedTariffId', id);
            localStorage.setItem('selectedTariffPrice', price);
            window.location.href = 'order.html';
        }
    </script>
    <script src="firebase-app.js"></script>
</body>
</html>
