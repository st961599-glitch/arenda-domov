<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДомикВНаем — Аренда домов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка сайта -->
    <header class="navbar">
        <div class="logo">🏡 ДомикВНаем</div>
        <nav class="nav-controls">
            <span id="user-display" class="user-email"></span>
            <button id="nav-cart-btn" class="btn btn-secondary hidden">🛒 Корзина (<span id="cart-count">0</span>)</button>
            <button id="logout-btn" class="btn btn-danger hidden">Выйти</button>
        </nav>
    </header>

    <!-- Уведомления (Toast) -->
    <div id="toast" class="toast hidden"></div>

    <main class="main-container">
        
        <!-- ЭКРАН 1: Авторизация (Вход и Регистрация) -->
        <section id="auth-screen" class="auth-box">
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active">Вход</button>
                <button id="tab-register" class="tab-btn">Регистрация</button>
            </div>

            <!-- Форма Входа -->
            <form id="login-form" class="auth-form">
                <h2>Рады вернуть вас!</h2>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="example@mail.com">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Войти в аккаунт</button>
            </form>

            <!-- Форма Регистрации -->
            <form id="register-form" class="auth-form hidden">
                <h2>Создать аккаунт</h2>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="register-email" required placeholder="example@mail.com">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="register-password" required placeholder="Минимум 6 символов">
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
        </section>

        <!-- ЭКРАН 2: Главная рабочая зона сайта -->
        <div id="app-screen" class="app-layout hidden">
            
            <!-- Левая колонка: Каталог и Форма -->
            <div class="content-area">
                
                <!-- Блок добавления нового дома -->
                <section class="panel">
                    <h3>➕ Сдать дом в аренду</h3>
                    <form id="listing-form" class="inline-form">
                        <input type="text" id="house-title" placeholder="Название (например, Шале в лесу)" required>
                        <input type="number" id="house-price" placeholder="Цена за сутки (₽)" required min="1">
                        <button type="submit" class="btn btn-success">Опубликовать</button>
                    </form>
                </section>

                <!-- Сетка объявлений -->
                <section class="catalog-section">
                    <h3>✨ Доступные предложения</h3>
                    <div id="listings-grid" class="listings-grid">
                        <!-- Сюда JS вставит реальные карточки -->
                    </div>
                </section>
            </div>

            <!-- Правая колонка: Корзина -->
            <aside id="cart-panel" class="panel cart-panel">
                <h3>🛍️ Ваша корзина</h3>
                <div id="cart-empty" class="empty-message">Корзина пуста. Добавьте дома из каталога!</div>
                <ul id="cart-list" class="cart-list"></ul>
                <div id="cart-footer" class="cart-footer hidden">
                    <div class="total-row">
                        <span>Итого к оплате:</span>
                        <span class="total-price"><span id="cart-sum">0</span> ₽</span>
                    </div>
                    <button id="checkout-btn" class="btn btn-primary btn-block">Забронировать все</button>
                </div>
            </aside>

        </div>
    </main>

    <!-- Подключаем Firebase -->
    <script type="module" src="app.js"></script>
</body>
</html>
